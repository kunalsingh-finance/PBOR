name: Monthly PBOR Run

on:
  schedule:
    - cron: "0 8 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  monthly-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Derive month-end
        shell: bash
        run: |
          ASOF="$(python scripts/last_month_end.py)"
          MONTH_TAG="${ASOF:0:7}"
          echo "ASOF=$ASOF" >> "$GITHUB_ENV"
          echo "MONTH_TAG=$MONTH_TAG" >> "$GITHUB_ENV"

      - name: Run monthly build and month-end
        id: pipeline
        continue-on-error: true
        shell: bash
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          set -o pipefail
          if [ -n "${FRED_API_KEY:-}" ]; then
            python scripts/build_real_data.py --fred-api-key "$FRED_API_KEY" 2>&1 | tee pipeline.log
          else
            python scripts/build_real_data.py 2>&1 | tee pipeline.log
          fi
          python -m src.run_month_end --asof "$ASOF" --data-dir ./data_real/market_real 2>&1 | tee -a pipeline.log

      - name: Commit monthly outputs
        if: steps.pipeline.outcome == 'success'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "outputs/$MONTH_TAG"
          if git diff --cached --quiet; then
            echo "No output changes to commit."
            exit 0
          fi
          git commit -m "PBOR auto-run: $MONTH_TAG [asof: $ASOF]"
          git push

      - name: Create failure issue
        if: steps.pipeline.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const title = `PBOR run failed \u2014 ${process.env.MONTH_TAG}`;
            const logBody = fs.existsSync("pipeline.log")
              ? fs.readFileSync("pipeline.log", "utf8").slice(-60000)
              : "pipeline.log was not created.";
            const body = [
              `Automated PBOR-Lite run failed for ${process.env.MONTH_TAG}.`,
              "",
              `As-of: ${process.env.ASOF}`,
              "",
              "```text",
              logBody,
              "```",
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });

            core.setFailed(`PBOR-Lite run failed for ${process.env.MONTH_TAG}`);
